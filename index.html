<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horario Personalizado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            padding: 25px;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
            font-weight: 600;
        }
        .schedule {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }
        .schedule th, .schedule td {
            border: 1px solid #dee2e6;
            padding: 12px;
            text-align: center;
            vertical-align: middle;
        }
        .schedule th {
            background-color: #3498db;
            color: white;
            font-weight: 600;
        }
        .time-column {
            background-color: #f8f9fa;
            font-weight: 600;
            width: 100px;
        }
        .course-slot {
            min-height: 80px;
            position: relative;
            cursor: pointer;
            transition: all 0.2s;
        }
        .course-slot:hover {
            background-color: #f1f8ff;
        }
        .course-item {
            padding: 8px;
            border-radius: 6px;
            margin: 4px 0;
            color: white;
            font-weight: 500;
            position: relative;
        }
        .delete-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            background: rgba(0, 0, 0, 0.3);
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            line-height: 1;
            cursor: pointer;
            display: none;
        }
        .course-item:hover .delete-btn {
            display: block;
        }
        .form-container {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
        }
        .btn-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }
        .time-header {
            background-color: #2c3e50;
        }
        .empty-slot {
            color: #adb5bd;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Horario Semanal Personalizado</h1>
        
        <div class="form-container">
            <div class="row">
                <div class="col-md-3">
                    <div class="mb-3">
                        <label for="courseName" class="form-label">Nombre del Curso</label>
                        <input type="text" class="form-control" id="courseName" placeholder="Ej: Matemáticas">
                    </div>
                </div>
                <div class="col-md-2">
                    <div class="mb-3">
                        <label for="daySelect" class="form-label">Día</label>
                        <select class="form-select" id="daySelect">
                            <option value="monday">Lunes</option>
                            <option value="tuesday">Martes</option>
                            <option value="wednesday">Miércoles</option>
                            <option value="thursday">Jueves</option>
                            <option value="friday">Viernes</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-2">
                    <div class="mb-3">
                        <label for="startTime" class="form-label">Hora Inicio</label>
                        <input type="time" class="form-control" id="startTime" step="3600" min="07:00" max="21:00">
                    </div>
                </div>
                <div class="col-md-2">
                    <div class="mb-3">
                        <label for="endTime" class="form-label">Hora Fin</label>
                        <input type="time" class="form-control" id="endTime" step="3600" min="08:00" max="22:00">
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="mb-3">
                        <label for="courseColor" class="form-label">Color del Curso</label>
                        <input type="color" class="form-control form-control-color" id="courseColor" value="#3498db">
                    </div>
                </div>
            </div>
            <div class="d-grid gap-2">
                <button class="btn btn-primary" id="addCourse">Agregar Curso</button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-bordered schedule" id="scheduleTable">
                <thead>
                    <tr>
                        <th class="time-header">Hora</th>
                        <th>Lunes</th>
                        <th>Martes</th>
                        <th>Miércoles</th>
                        <th>Jueves</th>
                        <th>Viernes</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Las filas se generarán dinámicamente con JavaScript -->
                </tbody>
            </table>
        </div>

        <div class="btn-container">
            <button class="btn btn-success" id="saveBtn">Guardar como Imagen</button>
            <button class="btn btn-danger" id="clearBtn">Eliminar Todo</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Generar las horas en la tabla
            const scheduleBody = document.querySelector('#scheduleTable tbody');
            const hours = [];
            
            // Crear horas de 7:00 AM a 9:00 PM
            for (let i = 7; i <= 21; i++) {
                hours.push(`${i}:00`);
            }
            
            // Generar las filas de la tabla
            hours.forEach(hour => {
                const row = document.createElement('tr');
                const timeCell = document.createElement('td');
                timeCell.className = 'time-column';
                timeCell.textContent = hour;
                row.appendChild(timeCell);
                
                // Crear celdas para cada día
                for (let i = 0; i < 5; i++) {
                    const cell = document.createElement('td');
                    cell.className = 'course-slot';
                    cell.dataset.time = hour;
                    cell.dataset.day = ['monday', 'tuesday', 'wednesday', 'thursday', 'friday'][i];
                    cell.innerHTML = '<div class="empty-slot">Disponible</div>';
                    row.appendChild(cell);
                }
                
                scheduleBody.appendChild(row);
            });
            
            // Almacenamiento de cursos
            let courses = JSON.parse(localStorage.getItem('courses')) || [];
            
            // Función para renderizar los cursos en el horario
            function renderCourses() {
                // Limpiar todas las celdas primero
                document.querySelectorAll('.course-slot').forEach(cell => {
                    cell.innerHTML = '<div class="empty-slot">Disponible</div>';
                });
                
                // Agregar los cursos
                courses.forEach(course => {
                    const { name, day, startTime, endTime, color } = course;
                    
                    // Encontrar las celdas correspondientes
                    const cells = document.querySelectorAll(`.course-slot[data-day="${day}"]`);
                    
                    cells.forEach(cell => {
                        const cellTime = cell.dataset.time;
                        const cellHour = parseInt(cellTime.split(':')[0]);
                        const startHour = parseInt(startTime.split(':')[0]);
                        const endHour = parseInt(endTime.split(':')[0]);
                        
                        if (cellHour >= startHour && cellHour < endHour) {
                            // Si es la primera hora del curso, mostrar el nombre
                            if (cellHour === startHour) {
                                cell.innerHTML = `
                                    <div class="course-item" style="background-color: ${color};">
                                        ${name}
                                        <button class="delete-btn" data-id="${course.id}">×</button>
                                    </div>
                                `;
                            } else {
                                // Para las horas siguientes, solo mostrar una barra de color
                                cell.innerHTML = `
                                    <div class="course-item" style="background-color: ${color}; opacity: 0.8;">
                                        ${name}
                                        <button class="delete-btn" data-id="${course.id}">×</button>
                                    </div>
                                `;
                            }
                        }
                    });
                });
                
                // Agregar event listeners a los botones de eliminar
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const courseId = this.dataset.id;
                        deleteCourse(courseId);
                    });
                });
            }
            
            // Función para agregar un nuevo curso
            function addCourse() {
                const name = document.getElementById('courseName').value;
                const day = document.getElementById('daySelect').value;
                const startTime = document.getElementById('startTime').value;
                const endTime = document.getElementById('endTime').value;
                const color = document.getElementById('courseColor').value;
                
                if (!name || !startTime || !endTime) {
                    alert('Por favor, complete todos los campos');
                    return;
                }
                
                const newCourse = {
                    id: Date.now(), // ID único basado en timestamp
                    name,
                    day,
                    startTime,
                    endTime,
                    color
                };
                
                courses.push(newCourse);
                localStorage.setItem('courses', JSON.stringify(courses));
                renderCourses();
                
                // Limpiar el formulario
                document.getElementById('courseName').value = '';
            }
            
            // Función para eliminar un curso
            function deleteCourse(courseId) {
                courses = courses.filter(course => course.id !== parseInt(courseId));
                localStorage.setItem('courses', JSON.stringify(courses));
                renderCourses();
            }
            
            // Función para guardar como imagen
            function saveAsImage() {
                html2canvas(document.getElementById('scheduleTable')).then(canvas => {
                    const link = document.createElement('a');
                    link.download = 'mi-horario.jpg';
                    link.href = canvas.toDataURL('image/jpeg', 0.9);
                    link.click();
                });
            }
            
            // Función para eliminar todos los cursos
            function clearAllCourses() {
                if (confirm('¿Está seguro de que desea eliminar todos los cursos?')) {
                    courses = [];
                    localStorage.setItem('courses', JSON.stringify(courses));
                    renderCourses();
                }
            }
            
            // Event Listeners
            document.getElementById('addCourse').addEventListener('click', addCourse);
            document.getElementById('saveBtn').addEventListener('click', saveAsImage);
            document.getElementById('clearBtn').addEventListener('click', clearAllCourses);
            
            // Renderizar cursos al cargar la página
            renderCourses();
        });
    </script>
</body>
</html>
